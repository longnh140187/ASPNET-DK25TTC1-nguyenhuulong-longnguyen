services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: recipe_website
      MYSQL_USER: recipe
      MYSQL_PASSWORD: recipe
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${WEB_PORT:-5080}:8080"
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: recipe_website
      DB_USER: recipe
      DB_PASSWORD: recipe
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/wwwroot/uploads

volumes:
  mysql_data:
  uploads_data:
